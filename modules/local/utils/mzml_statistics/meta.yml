name: mzml_statistics
description: A module for mzML file statistics
keywords:
  - mzML
  - statistics
tools:
  - custom:
      description: |
        A custom module for mzML file statistics.
      homepage: https://github.com/bigbio/quantmsdiann
      documentation: https://github.com/bigbio/quantmsdiann
input:
  - mzml:
      type: file
      description: Spectra file in mzML format
      pattern: "*.mzML"
output:
  - ms_statistics:
      type: file
      description: MS-level statistics parquet file
      pattern: "*_ms_info.parquet"
  - ms2_statistics:
      type: file
      description: MS2-level statistics parquet file (optional)
      pattern: "*_ms2_info.parquet"
      optional: true
  - feature_statistics:
      type: file
      description: Feature detection parquet file (optional)
      pattern: "*_feature_info.parquet"
      optional: true
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - log:
      type: file
      description: Log file from mzML statistics computation
      pattern: "*.log"
authors:
  - "@wanghong"
