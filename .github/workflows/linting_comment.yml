name: nf-core linting comment
# This workflow is triggered after the linting action is complete
# It posts an automated comment to the PR, even if the PR is coming from a fork

on:
  workflow_run:
    workflows: ["nf-core linting"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Download lint results
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: linting.yml
          workflow_conclusion: completed

      - name: Get PR number
        id: pr_number
        run: |
          if [[ -s linting-logs/PR_number.txt ]]; then
            pr_number=$(tr -d '[:space:]' < linting-logs/PR_number.txt)
            if [[ "$pr_number" =~ ^[0-9]+$ ]]; then
              echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            else
              echo "PR_number.txt does not contain a valid PR number; skipping comment."
            fi
          else
            echo "PR_number.txt is missing or empty; skipping comment."
          fi

      - name: Post PR comment
        if: ${{ steps.pr_number.outputs.pr_number != '' }}
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          number: ${{ steps.pr_number.outputs.pr_number }}
          path: linting-logs/lint_results.md
